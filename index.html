<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Client GLTF Viewer</title>

<style>

body{
margin:0;
overflow:hidden;
background:#ffffff;
font-family:Arial;
}

#menuBtn{
position:fixed;
top:15px;
left:15px;
width:52px;
height:52px;
background:#000a;
color:white;
font-size:28px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
cursor:pointer;
z-index:20;
}

#panel{
position:fixed;
top:0;
left:-300px;
width:280px;
height:100%;
background:#111;
color:white;
padding:20px;
transition:0.3s;
overflow-y:auto;
z-index:30;
display:flex;
flex-direction:column;
gap:12px;
}

#panel.open{ left:0; }

#closeBtn{
align-self:flex-end;
background:#333;
border:none;
color:white;
padding:6px 10px;
cursor:pointer;
}

#panel button{
background:#222;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

#panel input[type="range"],
#panel input[type="color"]{ width:100%; }

#variantButtons button{ background:#444; }

</style>
</head>

<body>

<div id="menuBtn">☰</div>

<div id="panel">

<button id="closeBtn">✕</button>

<h3>Viewer Controls</h3>

<button id="loadBtn">Load Model</button>
<input type="file" id="fileInput" accept=".glb,.gltf,.hdr" style="display:none">

<button id="screenshotBtn">Screenshot</button>
<button id="fullscreenBtn">Fullscreen</button>

<label>Exposure</label>
<input type="range" id="exposureSlider" min="0" max="3" step="0.01" value="1">

<label>Scale</label>
<input type="range" id="scaleSlider" min="0.1" max="5" step="0.01" value="1">

<label>Light Intensity</label>
<input type="range" id="lightSlider" min="0" max="10" step="0.1" value="3">

<label>Shadow Bias</label>
<input type="range" id="shadowSlider" min="-0.01" max="0.01" step="0.0001" value="-0.00002">

<label>Background Color</label>
<input type="color" id="bgColor" value="#ffffff">

<button id="rotateBtn">Toggle Rotate</button>

<h3>Material Variants</h3>
<div id="variantButtons"></div>

</div>

<script type="module">

import * as THREE from "https://esm.sh/three@0.161";
import {OrbitControls} from "https://esm.sh/three@0.161/examples/jsm/controls/OrbitControls.js";
import {GLTFLoader} from "https://esm.sh/three@0.161/examples/jsm/loaders/GLTFLoader.js";
import {RGBELoader} from "https://esm.sh/three@0.161/examples/jsm/loaders/RGBELoader.js";

/* SCENE */

const scene=new THREE.Scene();
scene.background=new THREE.Color("#ffffff");

const camera=new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,1,3);

/* RENDERER */

const renderer=new THREE.WebGLRenderer({
antialias:true,
preserveDrawingBuffer:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.toneMapping=THREE.ACESFilmicToneMapping;

document.body.appendChild(renderer.domElement);

/* CONTROLS */

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

/* LIGHTS */

const hemi=new THREE.HemisphereLight(0xffffff,0x444444,1);
scene.add(hemi);

const dir=new THREE.DirectionalLight(0xffffff,3);
dir.position.set(5,8,5);
dir.castShadow=true;
dir.shadow.mapSize.set(2048,2048);
scene.add(dir);

/* FLOOR */

const floor=new THREE.Mesh(
new THREE.PlaneGeometry(50,50),
new THREE.ShadowMaterial({opacity:0.25})
);

floor.rotation.x=-Math.PI/2;
floor.receiveShadow=true;
scene.add(floor);

/* LOADERS */

const loader=new GLTFLoader();
const rgbe=new RGBELoader();

let model=null;
let rotate=false;

let variants=[];
let variantMappings=[];

/* FRAME MODEL */

function frameModel(obj){

const box=new THREE.Box3().setFromObject(obj);
const size=box.getSize(new THREE.Vector3()).length();
const center=box.getCenter(new THREE.Vector3());

controls.target.copy(center);

camera.position.copy(center);
camera.position.x+=size/2;
camera.position.y+=size/5;
camera.position.z+=size/2;

controls.update();

}

/* DETECT VARIANTS */

function detectVariants(gltf){

variantMappings=[];
variants=[];

const json=gltf.parser.json;

if(!json.extensions || !json.extensions.KHR_materials_variants) return;

variants=json.extensions.KHR_materials_variants.variants.map(v=>v.name);

gltf.scene.traverse(obj=>{

if(!obj.isMesh) return;

const ext=obj.userData?.gltfExtensions?.KHR_materials_variants;
if(!ext) return;

variantMappings.push({
mesh:obj,
mappings:ext.mappings,
parser:gltf.parser
});

});

}

/* APPLY VARIANT */

async function applyVariant(index){

for(const entry of variantMappings){

for(const map of entry.mappings){

if(map.variants.includes(index)){

const mat=await entry.parser.getDependency("material",map.material);
entry.mesh.material=mat;

}

}

}

}

/* LOAD MODEL */

function loadModel(url){

loader.load(url,(gltf)=>{

if(model) scene.remove(model);

model=gltf.scene;
scene.add(model);

variantButtons.innerHTML="";

model.traverse(o=>{
if(o.isMesh){
o.castShadow=true;
o.receiveShadow=true;
}
});

detectVariants(gltf);

variants.forEach((name,i)=>{

const btn=document.createElement("button");
btn.textContent=name;
btn.onclick=()=>applyVariant(i);

variantButtons.appendChild(btn);

});

frameModel(model);

});

}

/* HDR LOAD */

function loadHDR(url){

rgbe.load(url,(tex)=>{
tex.mapping=THREE.EquirectangularReflectionMapping;
scene.environment=tex;
scene.background=tex;
});

}

/* FILE LOAD */

loadBtn.onclick=()=>fileInput.click();

fileInput.onchange=e=>{

const file=e.target.files[0];
if(!file) return;

if(file.name.endsWith(".hdr"))
loadHDR(URL.createObjectURL(file));
else
loadModel(URL.createObjectURL(file));

};

/* DRAG DROP */

document.addEventListener("dragover",e=>e.preventDefault());

document.addEventListener("drop",e=>{
e.preventDefault();
const file=e.dataTransfer.files[0];
if(!file) return;

if(file.name.endsWith(".hdr"))
loadHDR(URL.createObjectURL(file));
else
loadModel(URL.createObjectURL(file));

});

/* UI */

exposureSlider.oninput=()=>{
renderer.toneMappingExposure=parseFloat(exposureSlider.value);
};

scaleSlider.oninput=()=>{
if(model) model.scale.setScalar(parseFloat(scaleSlider.value));
};

lightSlider.oninput=()=>{
dir.intensity=parseFloat(lightSlider.value);
};

shadowSlider.oninput=()=>{
dir.shadow.bias=parseFloat(shadowSlider.value);
};

bgColor.oninput=()=>{
scene.background=new THREE.Color(bgColor.value);
};

rotateBtn.onclick=()=>rotate=!rotate;

/* SCREENSHOT */

screenshotBtn.onclick=()=>{
const a=document.createElement("a");
a.download="render.png";
a.href=renderer.domElement.toDataURL();
a.click();
};

/* FULLSCREEN */

fullscreenBtn.onclick=()=>{
if(!document.fullscreenElement)
document.body.requestFullscreen();
else
document.exitFullscreen();
};

/* PANEL */

menuBtn.onclick=()=>panel.classList.add("open");
closeBtn.onclick=()=>panel.classList.remove("open");

/* LOOP */

renderer.setAnimationLoop(()=>{

controls.update();

if(model && rotate)
model.rotation.y+=0.005;

renderer.render(scene,camera);

});

/* RESIZE */

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
